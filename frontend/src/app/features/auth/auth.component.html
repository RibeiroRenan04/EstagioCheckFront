<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <div class="brand">
        <div class="brand-icon"></div>
        <span class="brand-name">EstágioCheck</span>
      </div>
      <mat-card-title>Acesse sua conta</mat-card-title>
      <mat-card-subtitle>Aluno, preceptor ou professor supervisor</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <mat-tab-group [(selectedIndex)]="selectedTab" animationDuration="200ms">

        <!-- Login -->
        <mat-tab label="Entrar">
          <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="form">
            <mat-form-field appearance="outline">
              <mat-label>E-mail</mat-label>
              <input matInput type="email" formControlName="email" autocomplete="email">
              <mat-error *ngIf="loginForm.get('email')?.hasError('email')">E-mail inválido</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Senha</mat-label>
              <input matInput type="password" formControlName="password" autocomplete="current-password">
              <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">Mínimo 6 caracteres</mat-error>
            </mat-form-field>

            <button mat-raised-button color="primary" type="submit"
                    [disabled]="loginForm.invalid || busy()">
              <mat-spinner *ngIf="busy()" diameter="20"></mat-spinner>
              <span *ngIf="!busy()">Entrar</span>
            </button>
          </form>
        </mat-tab>

        <!-- Cadastro -->
        <mat-tab label="Cadastrar">
          <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="form">
            <mat-form-field appearance="outline">
              <mat-label>Nome completo</mat-label>
              <input matInput formControlName="fullName">
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>E-mail</mat-label>
              <input matInput type="email" formControlName="email">
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Matrícula <small>(opcional)</small></mat-label>
              <input matInput formControlName="matricula">
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Perfil</mat-label>
              <mat-select formControlName="role">
                <mat-option value="aluno">Aluno</mat-option>
                <mat-option value="preceptor">Preceptor (enfermeiro)</mat-option>
                <mat-option value="supervisor">Professor supervisor</mat-option>
              </mat-select>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Senha</mat-label>
              <input matInput type="password" formControlName="password" autocomplete="new-password">
              <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Mínimo 6 caracteres</mat-error>
            </mat-form-field>

            <button mat-raised-button color="primary" type="submit"
                    [disabled]="registerForm.invalid || busy()">
              <mat-spinner *ngIf="busy()" diameter="20"></mat-spinner>
              <span *ngIf="!busy()">Criar conta</span>
            </button>
          </form>
        </mat-tab>

      </mat-tab-group>
    </mat-card-content>
  </mat-card>
</div>
