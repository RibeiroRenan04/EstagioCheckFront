<mat-sidenav-container class="app-container">

  <!-- Sidenav -->
  <mat-sidenav #sidenav mode="side" [opened]="sidenavOpen" class="sidenav">
    <div class="brand">
      <div class="brand-icon"></div>
      <span class="brand-name">EstágioCheck</span>
    </div>

    <mat-nav-list>
      <a mat-list-item
         *ngFor="let item of navItems()"
         [routerLink]="item.path"
         routerLinkActive="active-link"
         [routerLinkActiveOptions]="{ exact: item.path === '/app' }">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </mat-nav-list>

    <div class="spacer"></div>
    <mat-divider></mat-divider>

    <div class="user-info">
      <div class="user-email">{{ user()?.email }}</div>
      <div class="user-role">{{ role() }}</div>
      <button mat-button (click)="logout()" class="logout-btn">
        <mat-icon>logout</mat-icon> Sair
      </button>
    </div>
  </mat-sidenav>

  <!-- Main content -->
  <mat-sidenav-content>
    <mat-toolbar color="primary" class="toolbar">
      <button mat-icon-button (click)="sidenav.toggle(); sidenavOpen = !sidenavOpen">
        <mat-icon>menu</mat-icon>
      </button>
      <span>EstágioCheck</span>
    </mat-toolbar>

    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
