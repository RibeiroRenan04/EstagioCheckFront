<div class="page-header"><h1>Usuários</h1></div>

<div *ngIf="loading()" class="loading-overlay"><mat-spinner diameter="48"></mat-spinner></div>

<mat-card *ngIf="!loading()">
  <mat-card-content>
    <table mat-table [dataSource]="users()" class="full-width" *ngIf="users().length; else empty">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let u">{{ u.fullName }}</td>
      </ng-container>
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>E-mail</th>
        <td mat-cell *matCellDef="let u">{{ u.email }}</td>
      </ng-container>
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Perfil</th>
        <td mat-cell *matCellDef="let u"><span class="role-chip">{{ u.role }}</span></td>
      </ng-container>
      <ng-container matColumnDef="group">
        <th mat-header-cell *matHeaderCellDef>Turma</th>
        <ng-container *matCellDef="let u">
          <td mat-cell *ngIf="u.role === 'aluno'">
            <mat-select [(ngModel)]="u.groupId" (ngModelChange)="assignGroup(u.id, $event)" style="min-width:150px">
              <mat-option [value]="null">Sem turma</mat-option>
              <mat-option *ngFor="let g of groups()" [value]="g.id">{{ g.name }}</mat-option>
            </mat-select>
          </td>
          <td mat-cell *ngIf="u.role !== 'aluno'">—</td>
        </ng-container>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let u"></td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <ng-template #empty>
      <div class="empty-state"><mat-icon>people</mat-icon><p>Nenhum usuário.</p></div>
    </ng-template>
  </mat-card-content>
</mat-card>
